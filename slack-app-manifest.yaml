display_information:
  name: Presence
  description: Private single-user Slack presence automation driven by Google Calendar and custom schedule rules.
  background_color: "#1F2937"
features:
  bot_user:
    display_name: Presence
    always_online: false
  slash_commands:
    - command: /presence
      description: Control the presence automation (status, focus, away, dnd, clear, patterns).
      usage_hint: "[status | focus <dur> | away <dur> | dnd <dur> | clear | pattern <add|list|delete> | help]"
      should_escape: false
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: true
oauth_config:
  scopes:
    user:
      # User scopes — needed to read/write the human user's profile status,
      # presence and DND. These are the scopes that make this app work for
      # the signed-in user specifically.
      - users.profile:read
      - users.profile:write
      - users:read
      - users:write
      - dnd:read
      - dnd:write
    bot:
      # Bot scopes — everything the app itself needs for slash commands,
      # the App Home tab and Socket Mode events.
      - commands
      - chat:write
      - users:read
      - app_mentions:read
settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
