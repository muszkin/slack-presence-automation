version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/storage/migrations"
    queries: "internal/storage/queries"
    gen:
      go:
        package: "storage"
        out: "internal/storage"
        sql_package: "database/sql"
        emit_interface: false
        emit_json_tags: false
        emit_prepared_queries: false
        emit_empty_slices: true
